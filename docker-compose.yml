# App + Postgres, for a VM or a prod-like local run.
#   docker compose up --build
# Secrets come from your .env (gitignored) — never from this file.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: funnel_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/funnel_agent
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SITE_ID: ${SITE_ID:-default}
      TRACK_WRITE_KEY: ${TRACK_WRITE_KEY}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      EXECUTION_MODE: ${EXECUTION_MODE:-shadow}
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
